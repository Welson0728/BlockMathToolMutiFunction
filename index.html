<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Base Ten Blocks Tool EN ZH BM</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      user-select: none;
    }

    .tool {
      width: min(96vw, 1180px);
      min-height: 100dvh;
      height: auto;
      margin: 0 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-panel {
      position: relative;
      min-height: 144px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .display {
      width: 100%;
      padding: 0 6px;
      text-align: center;
      color: #222;
      line-height: 1.12;
    }

    .number-line {
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 800;
      letter-spacing: 3px;
    }

    .number-line.hidden,
    .word-line.hidden {
      display: none;
    }

    .word-line {
      margin-top: 5px;
      min-height: 28px;
      font-size: clamp(18px, 2.6vw, 26px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: .3px;
      overflow-wrap: anywhere;
      padding: 0 6px;
    }

    .lang-switch {
      position: static;
      display: flex;
      gap: 5px;
      z-index: 100;
      background: #ffffff;
      padding: 5px;
      border-radius: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.10);
      margin: 0 auto;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lang-select {
      appearance: none;
      -webkit-appearance: none;
      height: 34px;
      min-width: 112px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      padding: 5px 30px 5px 10px;
      cursor: pointer;
      background-image:
        linear-gradient(45deg, transparent 50%, #222 50%),
        linear-gradient(135deg, #222 50%, transparent 50%);
      background-position:
        calc(100% - 16px) 14px,
        calc(100% - 10px) 14px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .lang-select:focus {
      outline: 3px solid rgba(0,0,0,.14);
      outline-offset: 2px;
    }

    .answer-btn,
    .speak-btn {
      height: 34px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .lang-btn { min-width: 42px; }
    .answer-btn { min-width: 66px; padding: 5px 8px; }
    .speak-btn { min-width: 42px; font-size: 15px; padding: 5px 8px; }

    .answer-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .lang-btn.active {
      background: #222;
      color: #fff;
    }

    .answer-btn:active,
    .speak-btn:active,
    .mode-btn:active,
    .build-btn:active,
    .workspace-reset:active,
    .formula-btn:active,
    .modal-close:active {
      transform: scale(.98);
    }

    .mode-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 8px 10px;
    }

    .mode-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 4px 6px;
    }

    .mode-label {
      font-size: 14px;
      font-weight: 900;
      color: #333;
      white-space: nowrap;
    }

    .mode-select {
      appearance: none;
      -webkit-appearance: none;
      height: 32px;
      min-width: 126px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      padding: 4px 30px 4px 10px;
      cursor: pointer;
      background-image:
        linear-gradient(45deg, transparent 50%, #222 50%),
        linear-gradient(135deg, #222 50%, transparent 50%);
      background-position:
        calc(100% - 16px) 13px,
        calc(100% - 10px) 13px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .mode-select:focus {
      outline: 3px solid rgba(0,0,0,.14);
      outline-offset: 2px;
    }

    .mode-btn,
    .build-btn,
    .formula-btn {
      min-width: 52px;
      height: 32px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      padding: 4px 10px;
      box-shadow: none;
    }

    .mode-btn.active {
      background: #222;
      color: #fff;
    }

    .build-btn.selected {
      background: #222;
      color: #fff;
    }

    .build-btn:disabled,
    .formula-btn:disabled,
    .speak-btn:disabled,
    .answer-btn:disabled {
      opacity: .42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .answer-btn:disabled {
      background: #f4f4f4;
      color: #999;
      border-color: #dddddd;
    }

    .formula-btn.hidden,
    .build-btn.hidden,
    .input-row.hidden,
    .input-error.hidden,
    .category-layer.hidden,
    .addition-layer.hidden,
    .add-group.hidden,
    .formula-modal.hidden {
      display: none;
    }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .input-label {
      font-size: 14px;
      font-weight: 900;
      color: #333;
      white-space: nowrap;
    }

    .number-input {
      width: 94px;
      height: 32px;
      border: 2px solid #222;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      padding: 3px 6px;
      outline: none;
    }

    .input-icon-btn {
      width: 32px;
      height: 32px;
      border: 2px solid #222;
      border-radius: 10px;
      background: #fff;
      color: #111;
      font-size: 17px;
      font-weight: 900;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      flex: 0 0 auto;
    }

    .input-icon-btn:active {
      transform: scale(.98);
    }

    .plus-symbol {
      font-size: 20px;
      font-weight: 900;
      color: #222;
    }

    .question-line {
      flex-basis: 100%;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      color: #222;
      min-height: 20px;
      line-height: 1.2;
    }

    .question-line.hidden {
      display: none;
    }

    .input-error {
      flex-basis: 100%;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
      color: #b00020;
      min-height: 18px;
      line-height: 1.2;
    }

    .input-error:not(.hidden) {
      background: #fff3f3;
      border: 2px solid #f0b8b8;
      border-radius: 10px;
      padding: 6px 10px;
      margin-top: 2px;
    }

    .input-error.success {
      color: #16803a;
    }

    .input-error.success:not(.hidden) {
      background: #f0fff5;
      border-color: #a9dfbd;
    }

    .main-area {
      flex: 1 0 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
    }

    .tray {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      align-content: start;
      gap: 10px;
      overflow-y: auto;
      touch-action: none;
    }

    .source-card {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 14px;
      border: 2px solid #ececec;
      background: #fff;
      font-weight: 800;
      font-size: 17px;
      color: #222;
      cursor: grab;
      touch-action: none;
    }

    .source-card:active {
      cursor: grabbing;
      transform: scale(.98);
    }

    .source-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      pointer-events: none;
    }

    .workspace {
      position: relative;
      min-height: 0;
      border: 3px dashed #c9c9c9;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
      touch-action: none;
    }

    .workspace.show-addition-area {
      min-height: 720px;
      height: 720px;
    }

    .workspace.show-addition-total {
      min-height: 1150px;
      height: 1150px;
    }

    .category-layer {
      position: absolute;
      inset: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      z-index: 2;
      pointer-events: none;
    }

    .category-box,
    .add-box {
      position: relative;
      border: 2px dashed #bdbdbd;
      border-radius: 16px;
      background: rgba(248, 248, 248, .78);
      overflow: hidden;
      contain: paint;
    }

    .category-title,
    .add-box-title {
      position: absolute;
      left: 8px;
      top: 6px;
      z-index: 3;
      color: #555;
      font-size: 14px;
      font-weight: 900;
      background: rgba(255,255,255,.82);
      border-radius: 8px;
      padding: 3px 7px;
      text-transform: lowercase;
    }

    .addition-layer {
      position: absolute;
      inset: 10px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      z-index: 2;
      pointer-events: none;
    }

    .addition-layer.show-total {
      grid-template-rows: 1fr 1fr 1fr;
    }

    .add-group {
      position: relative;
      border: 2px dashed #bdbdbd;
      border-radius: 16px;
      background: rgba(248, 248, 248, .78);
      overflow: hidden;
      padding: 48px 10px 10px;
    }

    .add-group-head {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 3;
      flex-wrap: wrap;
    }

    .add-group-label,
    .add-group-value {
      background: rgba(255,255,255,.88);
      border-radius: 10px;
      padding: 4px 9px;
      color: #333;
      font-weight: 900;
    }

    .add-group-label {
      font-size: 14px;
    }

    .add-group-value {
      font-size: 18px;
      color: #111;
      display: inline-grid;
      grid-template-columns: 24px auto;
      align-items: center;
      justify-content: center;
      column-gap: 5px;
      min-width: 78px;
      text-align: right;
    }

    .add-group-prefix {
      display: inline-block;
      width: 24px;
      text-align: center;
      font-weight: 900;
    }

    .add-group-prefix:empty::before {
      content: "\00a0";
    }

    .add-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .workspace-reset {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 80;
      font-size: 14px;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .hint {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #b5b5b5;
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 800;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }

    .block {
      position: absolute;
      object-fit: contain;
      touch-action: none;
      cursor: grab;
      z-index: 5;
    }

    .block:active {
      cursor: grabbing;
      z-index: 20;
    }

    .block.thousand { width: 172px; height: 172px; }
    .block.hundred { width: 153px; height: 153px; }
    .block.ten { width: 140px; height: 38px; }
    .block.one { width: 58px; height: 58px; }

    .ghost {
      position: fixed;
      pointer-events: none;
      object-fit: contain;
      opacity: .9;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    .formula-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, .32);
      padding: 18px;
    }

    .modal-card {
      width: min(94vw, 780px);
      max-height: 92vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      padding: 18px 18px 16px;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 900;
      color: #111;
    }

    .modal-close {
      min-width: 38px;
      height: 34px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .formula-stack {
      background: #fafafa;
      border-radius: 14px;
      border: 2px solid #ececec;
      padding: 16px;
      font-weight: 900;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .formula-pv {
      display: none;
    }

    .formula-row {
      display: grid;
      grid-template-columns: var(--formula-sign-width, 34px) var(--formula-digits-width, max-content);
      align-items: center;
      gap: var(--formula-gap, 8px);
      font-size: clamp(28px, 6vw, 36px);
      line-height: 1.1;
      width: var(--formula-full-width, max-content);
      min-width: 0;
      margin-left: auto;
      margin-right: auto;
    }

    .formula-carry-row {
      margin-bottom: 4px;
      font-size: clamp(18px, 4vw, 24px);
      color: #666;
    }

    .formula-carry {
      color: #666;
      font-size: clamp(16px, 3.6vw, 22px);
    }

    .formula-sign {
      text-align: center;
      font-weight: 900;
    }

    .formula-digits {
      display: grid;
      grid-template-columns: repeat(4, minmax(82px, 1fr));
      gap: 4px;
      text-align: center;
      width: var(--formula-digits-width, max-content);
    }

    .formula-digits > div {
      min-width: 82px;
      white-space: nowrap;
    }

    .formula-line {
      margin: 8px auto;
      border-top: 3px solid #222;
      width: var(--formula-full-width, min(100%, 372px));
    }

    .formula-explain {
      margin-top: 14px;
      border: 2px solid #ececec;
      border-radius: 14px;
      background: #fffdf7;
      padding: 12px;
      color: #111;
      font-weight: 800;
      font-family: Arial, Helvetica, sans-serif;
    }

    .formula-explain.hidden {
      display: none;
    }

    .teaching-panel {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #ffffff;
      border: 2px solid #eeeeee;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      max-height: 74px;
      overflow: hidden;
      transition: max-height .2s ease;
    }

    .teaching-panel.expanded {
      max-height: 240px;
      overflow-y: auto;
    }

    .teaching-panel.hidden {
      display: none;
    }

    .teaching-progress {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 0;
    }

    .teaching-panel.expanded .teaching-progress {
      margin-bottom: 10px;
    }

    .teaching-progress-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: #222;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
    }

    .teaching-status {
      font-size: 14px;
      font-weight: 800;
      color: #333;
    }

    .teaching-mini-note {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #555;
    }

    .guide-toggle {
      margin-left: auto;
      border: 2px solid #dddddd;
      border-radius: 999px;
      background: #fafafa;
      color: #222;
      font-size: 13px;
      font-weight: 900;
      padding: 4px 10px;
      cursor: pointer;
    }

    .guide-toggle:active {
      transform: scale(.98);
    }

    #checkPracticeBtn,
    #clearPracticeBtn,
    #formulaBtn {
      border-color: #b8b8b8;
      color: #555;
      background: #fafafa;
    }

    #checkPracticeBtn:disabled,
    #formulaBtn:disabled {
      border-color: #dddddd;
      color: #999;
      background: #f4f4f4;
    }

    .borrow-step-card.current-step {
      border: 2px solid #222;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .explain-title {
      font-size: 15px;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .explain-note {
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 10px;
      color: #444;
    }

    .easy-rule {
      background: #f5fbff;
      border: 2px solid #d8edf8;
      border-radius: 12px;
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.35;
    }

    .borrow-step-card {
      background: #fff;
      border: 2px solid #f0e4c7;
      border-radius: 12px;
      padding: 9px 10px;
      margin: 8px 0;
      line-height: 1.35;
      font-size: 13px;
    }

    .borrow-step-head {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .borrow-step-line {
      margin: 2px 0;
    }

    .calc-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
      gap: 7px;
      margin-top: 8px;
    }

    .calc-chip {
      background: #fff;
      border: 2px solid #e7e7e7;
      border-radius: 10px;
      padding: 7px 8px;
      text-align: center;
      font-size: 13px;
      line-height: 1.25;
    }

    @media (max-width: 700px) {
      body {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .tool {
        width: 100vw;
        min-height: 100dvh;
        height: auto;
        padding: 8px;
        gap: 8px;
        overflow: visible;
      }

      .top-panel {
        min-height: 118px;
        gap: 6px;
      }

      .number-line {
        font-size: clamp(42px, 12vw, 62px);
      }

      .word-line {
        font-size: clamp(17px, 5vw, 22px);
        min-height: 24px;
        line-height: 1.2;
      }

      .lang-switch {
        order: -1;
        gap: 4px;
        padding: 4px;
      }

      .lang-btn { min-width: 46px; height: 31px; font-size: 13px; padding: 5px 10px; }
      .answer-btn { min-width: 58px; height: 31px; font-size: 13px; padding: 5px 7px; }
      .speak-btn { min-width: 38px; height: 31px; font-size: 14px; padding: 5px 8px; }

      .mode-panel {
        gap: 6px;
        padding: 7px;
      }

      .mode-btn,
      .build-btn,
      .formula-btn {
        min-width: 48px;
        height: 30px;
        font-size: 13px;
        padding: 4px 8px;
      }

      .mode-label { font-size: 13px; }
      .mode-select {
        height: 30px;
        min-width: 118px;
        font-size: 13px;
        padding: 4px 28px 4px 8px;
        background-position:
          calc(100% - 15px) 12px,
          calc(100% - 9px) 12px;
      }

      .input-row { gap: 5px; }
      .input-label { font-size: 12px; }
      .number-input { width: 76px; height: 30px; font-size: 15px; }
      .plus-symbol { font-size: 17px; }
      .input-error { font-size: 12px; min-height: 16px; }

      .main-area {
        flex: 0 0 auto;
        min-height: auto;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
      }

      .tray {
        flex: 0 0 112px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px;
      }

      .source-card { min-width: 78px; height: 94px; font-size: 15px; padding: 6px; }
      .source-img { width: 54px; height: 54px; }

      .workspace {
        flex: 0 0 auto;
        min-height: 520px;
        height: 520px;
      }

      .workspace.show-addition-area {
        min-height: 720px;
        height: 720px;
      }

      .workspace.show-addition-total {
        min-height: 1600px;
        height: 1600px;
      }

      .workspace-reset { right: 10px; bottom: 10px; font-size: 13px; padding: 7px 12px; }

      .category-layer {
        inset: 8px;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);

        <button class="build-btn" id="buildFreeBtn" type="button">Show Blocks</button>
      </div>

      <div class="input-row hidden" id="additionInputRow">
        <span class="input-label" id="addFirstLabel">Number 1</span>
        <input class="number-input" id="addNumberAInput" type="number" inputmode="numeric" min="0" max="100000" placeholder="0" />

    const teachingPlaceLabels = {
      en: { one: "ones", ten: "tens", hundred: "hundreds", thousand: "thousands" },
      zh: { one: "个位", ten: "十位", hundred: "百位", thousand: "千位" },

    };

    const blockOriginalSize = {
      thousand: { pc: [172, 172], mobile: [140, 140] },
      hundred: { pc: [153, 153], mobile: [125, 125] },
      ten: { pc: [140, 38], mobile: [112, 32] },

    };

    languageSelect.addEventListener("change", () => setLanguage(languageSelect.value));
    modeSelect.addEventListener("change", () => setMode(modeSelect.value));
    buildFreeBtn.addEventListener("click", buildBlocksFromFreeInput);
    clearFreeInputBtn.addEventListener("click", () => clearSpecificInput("free"));

    clearAddInputsBtn.addEventListener("click", () => clearSpecificInput("ab"));
    practiceAddBtn.addEventListener("click", buildPracticeFromAdditionInput);
    checkPracticeBtn.addEventListener("click", checkPracticeAnswer);
    clearPracticeBtn.addEventListener("click", clearPracticeBlocksButton);
    formulaBtn.addEventListener("click", openFormulaModal);
    formulaCloseBtn.addEventListener("click", closeFormulaModal);
    formulaModal.addEventListener("click", e => { if (e.target === formulaModal) closeFormulaModal(); });
    teachingPanel.addEventListener("click", e => {
      if (!e.target.closest("[data-guide-toggle]")) return;
      teachingExpanded = !teachingExpanded;
      updateTeachingPanel();
    });

    [freeNumberInput, addNumberAInput, addNumberBInput].forEach(input => {
      input.addEventListener("keydown", event => {
        if (event.key !== "Enter") return;
        if (isOperationMode()) buildBlocksFromAdditionInput();
        else buildBlocksFromFreeInput();
      });
    });

    [addNumberAInput, addNumberBInput].forEach(input => {
      input.addEventListener("input", () => {
        if (!isOperationMode()) return;
        updateAdditionButtonStates();
      });

    function setLanguage(lang) {
      stopAllAudio();
      currentLang = lang;

      languageSelect.value = lang;

      const buttonText = buttonTextData[lang];
      answerBtn.textContent = buttonText.answer;
      answerBtn.setAttribute("aria-label", buttonText.answer);
      resetBtn.textContent = buttonText.reset;
      formulaBtn.textContent = buttonText.formula;
      formulaTitle.textContent = formulaTextData[lang].title;
      formulaCloseBtn.textContent = buttonText.close === "Close" ? "✕" : "✕";

      updateInputLabels();
      updateCategoryLabels();
      updateAdditionLabels();
      updateFormulaView();
      updateQuestionLine();
      updateAdditionButtonStates();
      updateErrorMessage();
      updateDisplay();
    }

    function updateInputLabels() {
      const text = inputTextData[currentLang];
      modeLabel.textContent = text.mode;
      modeSelect.options[0].textContent = text.free;
      modeSelect.options[1].textContent = text.addition;
      modeSelect.options[2].textContent = text.subtraction;
      operationSymbol.textContent = getOperationSymbol();
      freeNumberLabel.textContent = text.number;
      addFirstLabel.textContent = text.number1;
      addSecondLabel.textContent = text.number2;
      buildFreeBtn.textContent = text.blocks;
      buildAddBtn.textContent = text.blocks;
      regroupBtn.textContent = text.regroup;
      updateRegroupButtonLabel();
      practiceAddBtn.textContent = text.practice;
      checkPracticeBtn.textContent = text.check;
      clearPracticeBtn.textContent = text.clear;
      clearFreeInputBtn.setAttribute("aria-label", text.clearInput);
      clearFreeInputBtn.setAttribute("title", text.clearInput);
      clearAddInputsBtn.setAttribute("aria-label", text.clearInput);
      clearAddInputsBtn.setAttribute("title", text.clearInput);
      updateQuestionLine();
    }

    function updateCategoryLabels() {
      const labels = categoryTextData[currentLang];
      categoryBoxes.forEach(box => box.querySelector(".category-title").textContent = labels[box.dataset.category]);
      additionBoxes.forEach(box => box.querySelector(".add-box-title").textContent = labels[box.dataset.category]);
    }

    function isOperationMode() {
      return currentMode === "addition" || currentMode === "subtraction";
    }

    function getOperationSymbol() {
      return currentMode === "subtraction" ? "−" : "+";
    }

    function getOperationResult() {
      const a = Math.max(0, Math.floor(additionNumbers.a || 0));
      const b = Math.max(0, Math.floor(additionNumbers.b || 0));
      return currentMode === "subtraction" ? Math.max(0, a - b) : a + b;
    }

    function requiresRegroup(numberA, numberB) {
      let a = Math.max(0, Math.floor(numberA || 0));
      let b = Math.max(0, Math.floor(numberB || 0));
      while (a > 0 || b > 0) {
        if ((a % 10) < (b % 10)) return true;
        a = Math.floor(a / 10);
        b = Math.floor(b / 10);
      }
      return false;
    }

    function validateOperationNumbers(numberA, numberB) {
      if (currentMode === "addition") return validateAdditionTotal(numberA, numberB);
      if (currentMode === "subtraction") {
        if (numberA < numberB) {
          showInputError("subtractOrder");
          return false;
        }
      }
      return true;
    }

    function needsSubtractionRegroup() {
      return currentMode === "subtraction" &&
        additionNumbers.a >= additionNumbers.b &&
        requiresRegroup(additionNumbers.a, additionNumbers.b);
    }

    function canShowSubtractionAnswerNow() {
      if (currentMode !== "subtraction") return true;
      if (!validateOperationNumbers(additionNumbers.a, additionNumbers.b)) return false;
      if (needsSubtractionRegroup() && !subtractionRegrouped) {
        showInputError("regroup");
        updateAdditionButtonStates();
        return false;
      }
      return true;
    }

    function borrowToPlace(counts, index, order) {
      if (index >= order.length - 1) return false;
      const higher = order[index + 1];

      if (counts[higher] <= 0) {
        if (!borrowToPlace(counts, index + 1, order)) return false;
      }

      counts[higher] -= 1;
      counts[order[index]] += 10;
      return true;
    }

    function getRegroupedCountsForSubtraction(numberA, numberB) {
      const counts = getExpectedCounts(numberA);
      const subtractCounts = getExpectedCounts(numberB);
      const order = ["one", "ten", "hundred", "thousand"];

      for (let i = 0; i < order.length - 1; i++) {
        const place = order[i];
        if (counts[place] < subtractCounts[place]) {
          borrowToPlace(counts, i, order);
        }
      }

      return counts;
    }

    function createBlocksFromCounts(counts, group) {
      const valueMap = { thousand: 1000, hundred: 100, ten: 10, one: 1 };
      ["thousand", "hundred", "ten", "one"].forEach(type => {
        for (let i = 0; i < (counts[type] || 0); i++) {
          const block = createBlockElement(type, valueMap[type], group);
          block.dataset.placeCategory = type;
          total += valueMap[type];
        }
      });
    }

    function hasPendingBorrowFromCounts(counts, subtractCounts) {
      const order = ["one", "ten", "hundred", "thousand"];
      for (let i = 0; i < order.length - 1; i++) {
        const place = order[i];
        if ((counts[place] || 0) < (subtractCounts[place] || 0)) return true;
      }
      return false;
    }

    function doOneBorrowStep(counts, subtractCounts) {
      const order = ["one", "ten", "hundred", "thousand"];

      for (let i = 0; i < order.length - 1; i++) {
        const neededPlace = order[i];
        if ((counts[neededPlace] || 0) >= (subtractCounts[neededPlace] || 0)) continue;

        let sourceIndex = i + 1;
        while (sourceIndex < order.length && (counts[order[sourceIndex]] || 0) <= 0) {
          sourceIndex++;
        }
        if (sourceIndex >= order.length) return null;

        const sourcePlace = order[sourceIndex];
        const targetPlace = order[sourceIndex - 1];
        const beforeNeeded = counts[neededPlace] || 0;
        const beforeSource = counts[sourcePlace] || 0;
        const beforeTarget = counts[targetPlace] || 0;
        const subtractValue = subtractCounts[neededPlace] || 0;

        counts[sourcePlace] -= 1;
        counts[targetPlace] = (counts[targetPlace] || 0) + 10;

        return {
          neededPlace,
          sourcePlace,
          targetPlace,
          beforeNeeded,
          beforeSource,
          afterSource: counts[sourcePlace],
          beforeTarget,
          afterTarget: counts[targetPlace],
          subtractValue
        };
      }

      return null;
    }

    function rebuildSubtractionBlocksForStep() {
      stopAllAudio();
      closeFormulaModal();
      clearBlocks();

      createBlocksFromCounts(subtractionStepCounts || getExpectedCounts(additionNumbers.a), "A");
      createBlocksFromCounts(getExpectedCounts(additionNumbers.b), "B");

      additionBuilt = true;
      additionPracticeBuilt = false;
      additionFreeBuilt = false;
      practiceAddBtn.classList.remove("selected");
      hideAnswer();
      updateAdditionLabels();
      updateFormulaView();
      updateAdditionButtonStates();
      updateDisplay();
      updateWorkspaceLayout();
    }

    function buildRegroupedSubtractionBlocks() {
      stopAllAudio();
      closeFormulaModal();
      clearBlocks();

      const regroupedA = getRegroupedCountsForSubtraction(additionNumbers.a, additionNumbers.b);
      const normalB = getExpectedCounts(additionNumbers.b);

      createBlocksFromCounts(regroupedA, "A");
      createBlocksFromCounts(normalB, "B");

      additionBuilt = true;
      additionPracticeBuilt = false;
      additionFreeBuilt = false;
      subtractionRegrouped = true;
      practiceAddBtn.classList.remove("selected");
      hideAnswer();
      updateAdditionLabels();
      updateFormulaView();
      updateAdditionButtonStates();
      updateDisplay();
      updateWorkspaceLayout();
    }

    function regroupSubtraction() {
      if (currentMode !== "subtraction") return;

      if (additionFreeBuilt) syncAdditionNumbersFromBlocks();

      if (!validateOperationNumbers(additionNumbers.a, additionNumbers.b)) return;
      clearInputError();

      if (!needsSubtractionRegroup()) {
        subtractionRegrouped = true;
        subtractionStepCounts = null;
        subtractionStepIndex = 0;
        lastBorrowStepDetail = null;
      teachingExpanded = false;
        updateAdditionButtonStates();
        updateDisplay();
        return;
      }

      if (!subtractionStepCounts) {
        subtractionStepCounts = getExpectedCounts(additionNumbers.a);
      }

      const subtractCounts = getExpectedCounts(additionNumbers.b);
      const stepDetail = doOneBorrowStep(subtractionStepCounts, subtractCounts);

      if (!stepDetail) {
        subtractionRegrouped = true;
        updateAdditionButtonStates();
        updateDisplay();
        return;
      }

      subtractionStepIndex += 1;
      lastBorrowStepDetail = stepDetail;
      subtractionRegrouped = !hasPendingBorrowFromCounts(subtractionStepCounts, subtractCounts);
      rebuildSubtractionBlocksForStep();
    }

    function updateAdditionLabels() {
      const text = formulaTextData[currentLang];
      groupALabel.textContent = text.groupA;
      groupBLabel.textContent = text.groupB;
      groupTLabel.textContent = currentMode === "subtraction" ? text.answer : text.total;
      groupAValue.innerHTML = `<span class="add-group-prefix"></span><span>${additionNumbers.a}</span>`;
      groupBValue.innerHTML = `<span class="add-group-prefix">${getOperationSymbol()}</span><span>${additionNumbers.b}</span>`;
      groupTValue.innerHTML = `<span class="add-group-prefix">=</span><span>${getOperationResult()}</span>`;
      updateQuestionLine();
      updateAdditionButtonStates();
    }

    function updateQuestionLine() {
      const hasQuestion = isOperationMode() && (additionBuilt || additionPracticeBuilt);
      const text = inputTextData[currentLang];
      questionLine.textContent = `${text.question}: ${additionNumbers.a} ${getOperationSymbol()} ${additionNumbers.b}`;
      questionLine.classList.toggle("hidden", !hasQuestion);
    }

    function hasStudentBlocksInWorkspace() {
      return placedBlocks.some(block => block.dataset.group !== "T");
    }

    function hasOperationQuestionInputs() {
      return addNumberAInput.value.trim() !== "" && addNumberBInput.value.trim() !== "";
    }

    function clearOperationQuestionInputs() {
      addNumberAInput.value = "";
      addNumberBInput.value = "";
    }

    function switchOperationBuiltToFreeDrag() {
      closeFormulaModal();
      clearTotalAnswerBlocks();
      clearOperationQuestionInputs();
      additionBuilt = false;
      additionPracticeBuilt = false;
      additionFreeBuilt = true;
      subtractionRegrouped = false;
      subtractionStepCounts = null;
      subtractionStepIndex = 0;
      lastBorrowStepDetail = null;
      teachingExpanded = false;
      practiceAddBtn.classList.remove("selected");
      answerVisible = false;
      display.classList.add("hidden");
      wordDisplay.classList.add("hidden");
      speakBtn.disabled = true;
      clearInputError();
      syncAdditionNumbersFromBlocks();
      updateAdditionLabels();
      updateFormulaView();
      updateQuestionLine();
      updateAdditionButtonStates();
      updateWorkspaceLayout();
      updateDisplay();
    }

    function shouldDisableAnswerForSubtractionStep() {
      if (currentMode !== "subtraction") return false;
      if (!(additionBuilt || additionFreeBuilt)) return false;
      if (!hasStudentBlocksInWorkspace()) return false;
      if (additionNumbers.a < additionNumbers.b) return false;
      return needsSubtractionRegroup() && !subtractionRegrouped;
    }

    function updateAdditionButtonStates() {
      const isAdditionMode = isOperationMode();
      const isPractice = isAdditionMode && additionPracticeBuilt;
      const hasAdditionWork = isAdditionMode && (additionBuilt || additionPracticeBuilt || additionFreeBuilt);
      const canClearStudentBlocks = isAdditionMode && hasStudentBlocksInWorkspace();

      // Formula is only available after Answer is pressed.
      // If the user keys in again, enters Practice again, drags more blocks, or clears blocks,
      // hideAnswer() runs and Formula becomes grey again.
      const formulaReady = hasAdditionWork && answerVisible;

      const canRegroup =
        currentMode === "subtraction" &&
        (additionBuilt || additionFreeBuilt) &&
        hasStudentBlocksInWorkspace() &&
        needsSubtractionRegroup() &&
        !subtractionRegrouped;

      buildAddBtn.disabled = isAdditionMode && !hasOperationQuestionInputs();
      practiceAddBtn.disabled = isAdditionMode && !hasOperationQuestionInputs();
      regroupBtn.classList.toggle("hidden", currentMode !== "subtraction");
      regroupBtn.disabled = !canRegroup;
      formulaBtn.disabled = !formulaReady;
      checkPracticeBtn.disabled = !isPractice;
      clearPracticeBtn.disabled = !canClearStudentBlocks;
      resetBtn.style.display = isAdditionMode ? "none" : "inline-flex";
      answerBtn.disabled = shouldDisableAnswerForSubtractionStep();
      updateRegroupButtonLabel();
    }

    function getGroupBlockTotal(group) {
      return placedBlocks
        .filter(block => block.dataset.group === group && block.dataset.group !== "T")
        .reduce((sum, block) => sum + Number(block.dataset.value || 0), 0);
    }

    function syncAdditionNumbersFromBlocks() {
      if (!(isOperationMode() && additionFreeBuilt)) return;
      additionNumbers = {
        a: getGroupBlockTotal("A"),
        b: getGroupBlockTotal("B")
      };
      updateAdditionLabels();
    }

    function updateFormulaView() {
      if (isOperationMode() && additionFreeBuilt) {
        syncAdditionNumbersFromBlocks();
      }

      const text = formulaTextData[currentLang];
      const a = Math.max(0, Math.floor(additionNumbers.a || 0));
      const b = Math.max(0, Math.floor(additionNumbers.b || 0));
      const result = getOperationResult();
      const length = Math.max(String(a).length, String(b).length, String(result).length, 1);

      formulaTitle.textContent = text.title;
      formulaOperatorSign.textContent = getOperationSymbol();
      formulaPvLabels.innerHTML = getPlaceValueLabels(length, currentLang).map(item => `<div>${item}</div>`).join("");
      setFormulaColumnLayout(length);

      const topHelperDigits = currentMode === "addition"
        ? getCarryDigits(a, b, length)
        : getSubtractionBorrowDigits(a, b, length);

      renderFormulaDigits(formulaCarryDigits, topHelperDigits, currentMode === "subtraction");
      renderFormulaDigits(formulaDigitsA, padDigits(a, length), true);
      renderFormulaDigits(formulaDigitsB, padDigits(b, length), true);
      renderFormulaDigits(formulaDigitsSum, padDigits(result, length), true);
      updateFormulaExplanation(a, b, result, length, topHelperDigits);
    }

    function setFormulaColumnLayout(length) {
      const minWidth = window.matchMedia("(max-width: 700px)").matches ? 72 : 82;
      const signWidth = window.matchMedia("(max-width: 700px)").matches ? 30 : 34;
      const gap = 8;
      const digitGap = 4;
      const columns = `repeat(${length}, minmax(${minWidth}px, 1fr))`;
      const digitsWidth = (length * minWidth) + ((length - 1) * digitGap);
      const fullWidth = signWidth + gap + digitsWidth;

      formulaStack.style.setProperty("--formula-sign-width", signWidth + "px");
      formulaStack.style.setProperty("--formula-gap", gap + "px");
      formulaStack.style.setProperty("--formula-digits-width", digitsWidth + "px");
      formulaStack.style.setProperty("--formula-full-width", fullWidth + "px");

      [formulaCarryDigits, formulaDigitsA, formulaDigitsB, formulaDigitsSum].forEach(element => {
        element.style.gridTemplateColumns = columns;
      });

      formulaLine.style.width = fullWidth + "px";
    }

    function padDigits(value, length) {
      return String(Math.max(0, Math.floor(value))).padStart(length, "0").split("");
    }

    function getCarryDigits(a, b, length) {
      const ad = padDigits(a, length).map(Number);
      const bd = padDigits(b, length).map(Number);
      const carryRow = Array(length).fill("");
      let carry = 0;

      for (let i = length - 1; i >= 0; i--) {
        const total = ad[i] + bd[i] + carry;
        const nextCarry = Math.floor(total / 10);
        if (nextCarry > 0 && i > 0) carryRow[i - 1] = String(nextCarry);
        carry = nextCarry;
      }

      return carryRow;
    }

    function getPlaceLabelByType(type) {
      return (teachingPlaceLabels[currentLang] || teachingPlaceLabels.en)[type] || type;
    }

    function getTypeForFormulaIndex(index, length) {
      const order = ["one", "ten", "hundred", "thousand", "ten-thousand", "hundred-thousand"];
      const positionFromRight = length - 1 - index;
      return order[positionFromRight] || "";
    }

    function getSubtractionBorrowTeachingSteps(a, b) {
      const order = ["one", "ten", "hundred", "thousand"];
      const counts = getExpectedCounts(a);
      const subtractCounts = getExpectedCounts(b);
      const steps = [];
      let guard = 0;

      function firstInsufficientIndex() {
        for (let i = 0; i < order.length - 1; i++) {
          if ((counts[order[i]] || 0) < (subtractCounts[order[i]] || 0)) return i;
        }
        return -1;
      }

      let neededIndex = firstInsufficientIndex();
      while (neededIndex !== -1 && guard < 12) {
        guard++;

        let sourceIndex = neededIndex + 1;
        while (sourceIndex < order.length && (counts[order[sourceIndex]] || 0) <= 0) {
          sourceIndex++;
        }
        if (sourceIndex >= order.length) break;

        const source = order[sourceIndex];
        const target = order[sourceIndex - 1];
        const needed = order[neededIndex];
        const beforeSource = counts[source] || 0;
        const beforeTarget = counts[target] || 0;
        const beforeNeeded = counts[needed] || 0;

        counts[source] = beforeSource - 1;
        counts[target] = beforeTarget + 10;

        steps.push({
          needed,
          source,
          target,
          beforeNeeded,
          beforeSource,
          afterSource: counts[source],
          beforeTarget,
          afterTarget: counts[target]
        });

        neededIndex = firstInsufficientIndex();
      }

      return steps;
    }

    function getWorkingTopDigitsForSubtraction(a, b, length, topHelperDigits) {
      const hasBorrowRow = topHelperDigits.some(item => String(item || "") !== "");
      return hasBorrowRow ? topHelperDigits.map(item => Number(item || 0)) : padDigits(a, length).map(Number);
    }

    function getRegroupStepText(totalSteps) {
      const text = teachingTextData[currentLang] || teachingTextData.en;
      if (!totalSteps) return "";
      if (subtractionStepIndex === 0) return text.pressStep(totalSteps);
      if (subtractionRegrouped) return text.borrowDone;
      return text.stepDone(subtractionStepIndex, totalSteps);
    }

    function updateRegroupButtonLabel() {
      const text = inputTextData[currentLang];
      const totalSteps = isOperationMode() && currentMode === "subtraction"
        ? getSubtractionBorrowTeachingSteps(additionNumbers.a, additionNumbers.b).length
        : 0;
      if (!totalSteps) {
        regroupBtn.textContent = text.regroup;
        return;
      }
      const currentStep = subtractionRegrouped ? totalSteps : Math.min(subtractionStepIndex, totalSteps);
      regroupBtn.textContent = `${text.regroup} ${currentStep}/${totalSteps}`;
    }

    function updateTeachingPanel() {
      const hasGuide = isOperationMode() && (additionBuilt || additionPracticeBuilt || additionFreeBuilt);
      if (!hasGuide) {
        teachingPanel.classList.add("hidden");
        teachingPanel.classList.remove("expanded");
        teachingPanel.innerHTML = "";
        return;
      }

      const text = teachingTextData[currentLang] || teachingTextData.en;
      const a = Math.max(0, Math.floor(additionNumbers.a || 0));
      const b = Math.max(0, Math.floor(additionNumbers.b || 0));
      const result = getOperationResult();
      const length = Math.max(String(a).length, String(b).length, String(result).length, 1);
      const topDigitsOriginal = padDigits(a, length).map(Number);
      const bottomDigits = padDigits(b, length).map(Number);
      const answerDigits = padDigits(result, length).map(Number);
      let status = "";
      let detailsHtml = "";

      if (currentMode === "addition") {
        status = text.additionRule;
        let carry = 0;
        const steps = [];

        for (let i = length - 1; i >= 0; i--) {
          const place = getPlaceLabelByType(getTypeForFormulaIndex(i, length));
          const leftPlace = i > 0 ? getPlaceLabelByType(getTypeForFormulaIndex(i - 1, length)) : "";
          const top = topDigitsOriginal[i];
          const bottom = bottomDigits[i];
          const totalHere = top + bottom + carry;
          const writeDigit = totalHere % 10;
          const nextCarry = Math.floor(totalHere / 10);
          const firstLine = carry > 0
            ? text.addWithCarryIn(place, top, bottom, carry, totalHere)
            : text.addNoCarry(place, top, bottom, totalHere);
          const secondLine = nextCarry > 0 && leftPlace
            ? text.addCarry(writeDigit, leftPlace)
            : text.addNoMoreCarry(writeDigit);

          steps.push(`
            <div class="borrow-step-card">
              <div class="borrow-step-head">${text.step} ${steps.length + 1}: ${place}</div>
              <div class="borrow-step-line">${firstLine}</div>
              <div class="borrow-step-line">${secondLine}</div>
            </div>
          `);

          carry = nextCarry;
        }

        detailsHtml = `
          ${steps.join("")}
          <div class="teaching-mini-note">${answerVisible ? text.pressFormula : text.pressAnswer}</div>
        `;
      } else {
        const borrowSteps = getSubtractionBorrowTeachingSteps(a, b);
        status = borrowSteps.length ? getRegroupStepText(borrowSteps.length) : text.noBorrow;

        if (borrowSteps.length) {
          detailsHtml += borrowSteps.map((step, index) => {
            const place = getPlaceLabelByType(step.needed);
            const source = getPlaceLabelByType(step.source);
            const target = getPlaceLabelByType(step.target);
            const subtractValue = getExpectedCounts(b)[step.needed] || 0;
            const currentTopAfterStep = step.needed === step.target ? step.afterTarget : step.beforeNeeded;
            const currentAnswerAfterStep = currentTopAfterStep - subtractValue;
            const highlightIndex = subtractionStepIndex > 0 ? Math.min(subtractionStepIndex - 1, borrowSteps.length - 1) : -1;
            const currentClass = index === highlightIndex ? " current-step" : "";

            return `
              <div class="borrow-step-card${currentClass}">
                <div class="borrow-step-head">${text.step} ${index + 1}: ${place}</div>
                <div class="borrow-step-line">${text.subNeedBorrow(place, step.beforeNeeded || 0, subtractValue)}</div>
                <div class="borrow-step-line">${text.subBorrow(source, target)}</div>
                <div class="borrow-step-line">${text.subChange(source, step.beforeSource, step.afterSource, target, step.beforeTarget, step.afterTarget)}</div>
                ${step.needed === step.target ? `<div class="borrow-step-line">${text.subAfterBorrow(place, currentTopAfterStep, subtractValue, currentAnswerAfterStep)}</div>` : ""}
              </div>
            `;
          }).join("");
        }

        const topHelperDigits = getSubtractionBorrowDigits(a, b, length);
        const topDigits = getWorkingTopDigitsForSubtraction(a, b, length, topHelperDigits);
        const calcHtml = [];

        for (let i = length - 1; i >= 0; i--) {
          const place = getPlaceLabelByType(getTypeForFormulaIndex(i, length));
          calcHtml.push(`<div class="calc-chip">${text.subNormal(place, topDigits[i], bottomDigits[i], answerDigits[i])}</div>`);
        }

        detailsHtml += `
          <div class="explain-title">${text.finalTitle}</div>
          <div class="calc-list">${calcHtml.join("")}</div>
          <div class="teaching-mini-note">${answerVisible ? text.pressFormula : text.pressAnswer}</div>
        `;
      }

      const toggleText = teachingExpanded ? text.hideGuide : text.showGuide;
      const collapsedNote = teachingExpanded ? "" : `<div class="teaching-mini-note">${text.guideCollapsedNote}</div>`;

      teachingPanel.innerHTML = `
        <div class="teaching-progress">
          <span class="teaching-progress-badge">${text.statusLabel}</span>
          <span class="teaching-status">${status}</span>
          <button class="guide-toggle" type="button" data-guide-toggle>${toggleText}</button>
        </div>
        ${collapsedNote}
        ${teachingExpanded ? `<div class="teaching-details">${detailsHtml}</div>` : ""}
      `;

      teachingPanel.classList.remove("hidden");
      teachingPanel.classList.toggle("expanded", teachingExpanded);
    }

    function updateFormulaExplanation(a, b, result, length, topHelperDigits) {
      const text = teachingTextData[currentLang] || teachingTextData.en;
      const topDigitsOriginal = padDigits(a, length).map(Number);
      const bottomDigits = padDigits(b, length).map(Number);
      const answerDigits = padDigits(result, length).map(Number);

      if (currentMode === "addition") {
        let carry = 0;
        const steps = [];

        for (let i = length - 1; i >= 0; i--) {
          const place = getPlaceLabelByType(getTypeForFormulaIndex(i, length));
          const leftPlace = i > 0 ? getPlaceLabelByType(getTypeForFormulaIndex(i - 1, length)) : "";
          const top = topDigitsOriginal[i];
          const bottom = bottomDigits[i];
          const totalHere = top + bottom + carry;
          const writeDigit = totalHere % 10;
          const nextCarry = Math.floor(totalHere / 10);

          const firstLine = carry > 0
            ? text.addWithCarryIn(place, top, bottom, carry, totalHere)
            : text.addNoCarry(place, top, bottom, totalHere);

          const secondLine = nextCarry > 0 && leftPlace
            ? text.addCarry(writeDigit, leftPlace)
            : text.addNoMoreCarry(writeDigit);

          steps.push(`
            <div class="borrow-step-card">
              <div class="borrow-step-head">${text.step} ${steps.length + 1}: ${place}</div>
              <div class="borrow-step-line">${firstLine}</div>
              <div class="borrow-step-line">${secondLine}</div>
            </div>
          `);

          carry = nextCarry;
        }

        const hasCarryNote = topHelperDigits.some(item => String(item || "") !== "");
        formulaExplain.innerHTML = `
          <div class="explain-title">${text.additionTitle}</div>
          <div class="easy-rule">${text.additionRule}</div>
          ${hasCarryNote ? `<div class="easy-rule">${text.formulaCarryNote}</div>` : ""}
          ${steps.join("")}
        `;
        formulaExplain.classList.remove("hidden");
        return;
      }

      if (currentMode !== "subtraction") {
        formulaExplain.classList.add("hidden");
        formulaExplain.innerHTML = "";
        return;
      }

      const topDigits = getWorkingTopDigitsForSubtraction(a, b, length, topHelperDigits);
      const borrowSteps = getSubtractionBorrowTeachingSteps(a, b);

      const borrowHtml = borrowSteps.length
        ? borrowSteps.map((step, index) => {
            const place = getPlaceLabelByType(step.needed);
            const source = getPlaceLabelByType(step.source);
            const target = getPlaceLabelByType(step.target);
            const subtractValue = getExpectedCounts(b)[step.needed] || 0;
            const currentTopAfterStep = step.needed === step.target ? step.afterTarget : step.beforeNeeded;
            const currentAnswerAfterStep = currentTopAfterStep - subtractValue;

            return `
              <div class="borrow-step-card">
                <div class="borrow-step-head">${text.step} ${index + 1}: ${place}</div>
                <div class="borrow-step-line">${text.subNeedBorrow(place, step.beforeNeeded || 0, subtractValue)}</div>
                <div class="borrow-step-line">${text.subBorrow(source, target)}</div>
                <div class="borrow-step-line">${text.subChange(source, step.beforeSource, step.afterSource, target, step.beforeTarget, step.afterTarget)}</div>
                ${step.needed === step.target ? `<div class="borrow-step-line">${text.subAfterBorrow(place, currentTopAfterStep, subtractValue, currentAnswerAfterStep)}</div>` : ""}
              </div>
            `;
          }).join("")
        : `<div class="easy-rule">${text.noBorrow}</div>`;

      const calcHtml = [];
      for (let i = length - 1; i >= 0; i--) {
        const place = getPlaceLabelByType(getTypeForFormulaIndex(i, length));
        calcHtml.push(`<div class="calc-chip">${text.subNormal(place, topDigits[i], bottomDigits[i], answerDigits[i])}</div>`);
      }

      const hasBorrowNote = topHelperDigits.some(item => String(item || "") !== "");
      formulaExplain.innerHTML = `
        <div class="explain-title">${text.subtractionTitle}</div>
        <div class="easy-rule">${text.subtractionRule}</div>
        ${hasBorrowNote ? `<div class="easy-rule">${text.formulaBorrowNote}</div>` : ""}
        ${borrowHtml}
        <div class="explain-title">${text.finalTitle}</div>
        <div class="calc-list">${calcHtml.join("")}</div>
      `;
      formulaExplain.classList.remove("hidden");
    }

    function getSubtractionBorrowDigits(a, b, length) {
      if (currentMode !== "subtraction") return Array(length).fill("");
      if (a < b) return Array(length).fill("");

      const top = padDigits(a, length).map(Number);
      const bottom = padDigits(b, length).map(Number);
      const work = [...top];
      let changed = false;

      for (let i = length - 1; i >= 0; i--) {
        if (work[i] >= bottom[i]) continue;

        let source = i - 1;
        while (source >= 0 && work[source] <= 0) source--;
        if (source < 0) return Array(length).fill("");

        work[source] -= 1;
        for (let k = source + 1; k < i; k++) {
          work[k] += 9;
        }
        work[i] += 10;
        changed = true;
      }

      if (!changed) return Array(length).fill("");
      return work.map(value => String(value));
    }

    function getPlaceValueLabels(length, lang) {
      const labels = {
        en: ["one", "ten", "hundred", "thousand", "ten thousand", "hundred thousand", "million", "ten million", "hundred million", "billion"],
        zh: ["个", "十", "百", "千", "万", "十万", "百万", "千万", "亿", "十亿"],
        bm: ["sa", "puluh", "ratus", "ribu", "puluh ribu", "ratus ribu", "juta", "puluh juta", "ratus juta", "bilion"]
      };
      const arr = labels[lang] || labels.en;
      const picked = [];
      for (let i = length - 1; i >= 0; i--) {
        picked.push(arr[i] || "");
      }
      return picked;
    }

    function renderFormulaDigits(target, digits, showZeros) {
      target.innerHTML = digits.map((d, index) => {
        const text = (d === "0" || d === 0) && !showZeros ? "" : String(d);
        return `<div>${text}</div>`;
      }).join("");
    }

    function openFormulaModal() {
      if (!isOperationMode()) return;
      if (formulaBtn.disabled) return;
      if (!additionBuilt && !additionPracticeBuilt && !additionFreeBuilt) return;

      updateFormulaView();
      formulaModal.classList.remove("hidden");
      formulaModal.setAttribute("aria-hidden", "false");
    }

    function closeFormulaModal() {
      formulaModal.classList.add("hidden");
      formulaModal.setAttribute("aria-hidden", "true");
    }

    function setMode(mode, options = {}) {
      const { preserveBlocks = false } = options;
      const modeChanged = currentMode !== mode;
      currentMode = mode;
      if (modeChanged) teachingExpanded = false;

      if (modeChanged) {
        clearNumberInputs();
      }

      if (mode === "free") {
        clearTotalAnswerBlocks();

        if (modeChanged && !preserveBlocks) {
          placedBlocks.splice(0).forEach(block => block.remove());
          total = 0;
        }

        additionBuilt = false;
        additionPracticeBuilt = false;
        additionFreeBuilt = false;
        practiceAddBtn.classList.remove("selected");
        formulaBtn.classList.add("hidden");
        questionLine.classList.add("hidden");
        placedBlocks.forEach(block => {
          delete block.dataset.group;
          delete block.dataset.placeCategory;
        });
      } else if (isOperationMode()) {
        if (modeChanged && !preserveBlocks) {
          clearBlocks();
          additionNumbers = { a: 0, b: 0 };
        }
        additionBuilt = false;
        additionPracticeBuilt = false;
        additionFreeBuilt = true;
        practiceAddBtn.classList.remove("selected");
        formulaBtn.classList.remove("hidden");
        updateAdditionLabels();
      }

      modeSelect.value = mode;
      freeInputRow.classList.toggle("hidden", mode !== "free");
      additionInputRow.classList.toggle("hidden", !isOperationMode());
      operationSymbol.textContent = getOperationSymbol();

      if (!preserveBlocks) hideAnswer();
      else {
        closeFormulaModal();
        hideAnswer();
      }

      updateQuestionLine();
      updateAdditionButtonStates();
      updateWorkspaceLayout();
      updateDisplay();
    }

    function clearNumberInputs() {
      freeNumberInput.value = "";
      addNumberAInput.value = "";
      addNumberBInput.value = "";
      clearInputError();
      updateQuestionLine();
      updateAdditionButtonStates();
    }

    function clearOperationVisualState() {
      stopAllAudio();
      closeFormulaModal();
      clearBlocks();
      hideAnswer();
      additionBuilt = false;
      additionPracticeBuilt = false;
      additionFreeBuilt = true;
      subtractionRegrouped = false;
      subtractionStepCounts = null;
      subtractionStepIndex = 0;
      lastBorrowStepDetail = null;
      teachingExpanded = false;
      practiceAddBtn.classList.remove("selected");
      additionNumbers = {
        a: getInputNumber(addNumberAInput),
        b: getInputNumber(addNumberBInput)
      };
      clearInputError();
      updateAdditionLabels();
      updateFormulaView();
      updateAdditionButtonStates();
      updateDisplay();
      updateWorkspaceLayout();
    }

    function clearSpecificInput(which) {
      if (which === "free") {
        freeNumberInput.value = "";
        if (currentMode === "free") {
          stopAllAudio();
          closeFormulaModal();
          clearBlocks();
          hideAnswer();
          clearInputError();
          additionBuilt = false;
          additionPracticeBuilt = false;
          additionFreeBuilt = false;
          additionNumbers = { a: 0, b: 0 };
          updateDisplay();
          updateWorkspaceLayout();
        }
        return;
      }

      if (which === "ab") {
        addNumberAInput.value = "";
        addNumberBInput.value = "";
      }

      if (isOperationMode()) {
        clearOperationVisualState();
      }
    }

    function showInputError(key) {
      currentErrorKey = key;
      inputError.textContent = errorTextData[currentLang][key];
      inputError.classList.toggle("success", key === "correct");
      inputError.classList.remove("hidden");
    }

    function clearInputError() {
      currentErrorKey = "";
      inputError.textContent = "";
      inputError.classList.remove("success");
      inputError.classList.add("hidden");
    }

    function updateErrorMessage() {
      if (currentErrorKey) inputError.textContent = errorTextData[currentLang][currentErrorKey];
    }

    function getInputNumber(input) {
      const value = Number(input.value);
      if (!Number.isFinite(value)) return 0;
      return Math.floor(value);
    }

    function getCurrentVisualMax() {
      return isOperationMode() ? MAX_ADDITION_TOTAL : MAX_FREE_TOTAL;
    }

    function validateInputNumber(input) {
      const value = getInputNumber(input);
      if (value < 0 || value > MAX_INPUT_NUMBER) {
        showInputError("range");
        return null;
      }
      return value;
    }

    function validateAdditionTotal(numberA, numberB) {
      if (numberA + numberB > MAX_ADDITION_TOTAL) {
        showInputError("total");
        return false;
      }
      return true;
    }

    function clearBlocks() {
      placedBlocks.splice(0).forEach(block => block.remove());
      total = 0;
    }

    function getBlockPiecesForNumber(number) {
      const pieces = [];
      let remaining = Math.max(0, Math.floor(number));
      const thousands = Math.floor(remaining / 1000); remaining %= 1000;
      const hundreds = Math.floor(remaining / 100); remaining %= 100;
      const tens = Math.floor(remaining / 10);
      const ones = remaining % 10;
      for (let i = 0; i < thousands; i++) pieces.push({ type: "thousand", value: 1000 });
      for (let i = 0; i < hundreds; i++) pieces.push({ type: "hundred", value: 100 });
      for (let i = 0; i < tens; i++) pieces.push({ type: "ten", value: 10 });
      for (let i = 0; i < ones; i++) pieces.push({ type: "one", value: 1 });
      return pieces;
    }

    function createBlockElement(type, value, group = "") {
      const block = document.createElement("img");
      block.src = `assets/${type}.png`;
      block.onerror = () => block.src = `assets/${type}.svg`;
      block.className = `block ${type}`;
      block.dataset.type = type;
      block.dataset.value = value;
      if (group) block.dataset.group = group;
      setBlockOriginalSize(block);
      workspace.appendChild(block);
      block.addEventListener("pointerdown", startMoveExisting);
      placedBlocks.push(block);
      return block;
    }

    function clearTotalAnswerBlocks() {
      for (let i = placedBlocks.length - 1; i >= 0; i--) {
        const block = placedBlocks[i];
        if (block.dataset.group !== "T") continue;
        block.remove();
        placedBlocks.splice(i, 1);
      }
    }

    function createTotalAnswerBlocks() {
      clearTotalAnswerBlocks();

      if (!(isOperationMode() && (additionBuilt || additionFreeBuilt) && answerVisible)) return;

      const result = getOperationResult();
      getBlockPiecesForNumber(result).forEach(piece => {
        const block = createBlockElement(piece.type, piece.value, "T");
        block.dataset.answerTotal = "true";
        block.style.pointerEvents = "none";
        block.style.cursor = "default";
      });
    }

    function updateAdditionTotalView() {
      const showTotal = isOperationMode() && (additionBuilt || additionFreeBuilt) && answerVisible;
      totalAnswerGroup.classList.toggle("hidden", !showTotal);
      additionLayer.classList.toggle("show-total", showTotal);
      workspace.classList.toggle("show-addition-total", showTotal);

      if (showTotal) createTotalAnswerBlocks();
      else clearTotalAnswerBlocks();

      updateAdditionButtonStates();
    }

    function buildBlocksFromNumbers(numbers, groups = []) {
      stopAllAudio();
      clearBlocks();
      numbers.forEach((number, index) => {
        const safeNumber = Math.max(0, Math.floor(number));
        getBlockPiecesForNumber(safeNumber).forEach(piece => {
          createBlockElement(piece.type, piece.value, groups[index] || "");
          total += piece.value;
        });
      });
      hideAnswer();
      updateQuestionLine();
      updateAdditionButtonStates();
      updateDisplay();
      updateWorkspaceLayout();
    }

    function buildBlocksFromFreeInput() {
      const number = validateInputNumber(freeNumberInput);
      if (number === null) return;
      clearInputError();
      additionBuilt = false;
      additionPracticeBuilt = false;
      additionFreeBuilt = false;
      subtractionRegrouped = false;
      subtractionStepCounts = null;
      subtractionStepIndex = 0;
      lastBorrowStepDetail = null;
      teachingExpanded = false;
      practiceAddBtn.classList.remove("selected");
      additionNumbers = { a: 0, b: 0 };
      buildBlocksFromNumbers([number], [""]);
    }

    function buildBlocksFromAdditionInput() {
      const numberA = validateInputNumber(addNumberAInput);
      if (numberA === null) return;
      const numberB = validateInputNumber(addNumberBInput);
      if (numberB === null) return;
      if (!validateOperationNumbers(numberA, numberB)) return;
      clearInputError();
      practiceAddBtn.classList.remove("selected");
      additionPracticeBuilt = false;
      additionFreeBuilt = false;
      subtractionRegrouped = false;
      subtractionStepCounts = null;
      subtractionStepIndex = 0;
      lastBorrowStepDetail = null;
      teachingExpanded = false;
      additionBuilt = true;
      additionNumbers = { a: numberA, b: numberB };
      updateAdditionLabels();
      updateFormulaView();
      updateAdditionButtonStates();
      buildBlocksFromNumbers([numberA, numberB], ["A", "B"]);
    }

    function buildPracticeFromAdditionInput() {
      const numberA = validateInputNumber(addNumberAInput);
      if (numberA === null) return;
      const numberB = validateInputNumber(addNumberBInput);
      if (numberB === null) return;
      if (!validateOperationNumbers(numberA, numberB)) return;
      clearInputError();
      practiceAddBtn.classList.add("selected");
      additionBuilt = false;
      additionFreeBuilt = false;
      subtractionRegrouped = false;
      subtractionStepCounts = null;
      subtractionStepIndex = 0;
      lastBorrowStepDetail = null;
      teachingExpanded = false;
      additionPracticeBuilt = true;
      additionNumbers = { a: numberA, b: numberB };
      closeFormulaModal();
      clearBlocks();
      updateAdditionLabels();
      updateFormulaView();
      updateAdditionButtonStates();
      hideAnswer();
      updateDisplay();
      updateWorkspaceLayout();
    }

    sources.forEach(source => source.addEventListener("pointerdown", startFromSource));

    function startFromSource(e) {
      e.preventDefault();
      const source = e.currentTarget;
      const type = source.dataset.type;
      const value = Number(source.dataset.value);
      const img = source.querySelector("img");

      const ghost = document.createElement("img");
      ghost.src = img.currentSrc || img.src;
      ghost.className = "ghost";
      setGhostSize(ghost, type);
      document.body.appendChild(ghost);

      currentDrag = { mode: "new", pointerId: e.pointerId, type, value, ghost };
      moveGhost(e.clientX, e.clientY);

      source.setPointerCapture(e.pointerId);
      source.addEventListener("pointermove", onSourcePointerMove);
      source.addEventListener("pointerup", onSourcePointerUp);
      source.addEventListener("pointercancel", onSourcePointerUp);
    }

    function setGhostSize(ghost, type) {
      const small = window.matchMedia("(max-width: 700px)").matches;
      const size = {
        thousand: small ? ["140px", "140px"] : ["172px", "172px"],
        hundred: small ? ["125px", "125px"] : ["153px", "153px"],
        ten: small ? ["112px", "32px"] : ["140px", "38px"],
        one: small ? ["50px", "50px"] : ["58px", "58px"]
      }[type];
      ghost.style.width = size[0];
      ghost.style.height = size[1];
    }

    function onSourcePointerMove(e) {
      if (!currentDrag) return;
      moveGhost(e.clientX, e.clientY);
    }

    function onSourcePointerUp(e) {
      if (!currentDrag) return;
      const source = e.currentTarget;
      source.removeEventListener("pointermove", onSourcePointerMove);
      source.removeEventListener("pointerup", onSourcePointerUp);
      source.removeEventListener("pointercancel", onSourcePointerUp);

      const rect = workspace.getBoundingClientRect();
      const isInside = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;

      if (isInside) {
        clearInputError();

        if (isOperationMode() && additionBuilt) {
          switchOperationBuiltToFreeDrag();
          const target = findValidAdditionTargetAt(e.clientX, e.clientY, currentDrag.type);
          if (target) addPracticeBlock(currentDrag.type, currentDrag.value, target.group, target.category);
        } else if (isOperationMode() && (additionPracticeBuilt || additionFreeBuilt)) {
          if (additionFreeBuilt && hasOperationQuestionInputs()) {
            clearOperationQuestionInputs();
            clearInputError();
            syncAdditionNumbersFromBlocks();
            updateAdditionLabels();
            updateAdditionButtonStates();
          }
          const target = findValidAdditionTargetAt(e.clientX, e.clientY, currentDrag.type);
          if (target) addPracticeBlock(currentDrag.type, currentDrag.value, target.group, target.category);
        } else {
          addBlock(currentDrag.type, currentDrag.value, e.clientX - rect.left, e.clientY - rect.top);
        }
      }

      currentDrag.ghost.remove();
      currentDrag = null;
    }

    function switchAdditionToFreeMode() {
      if (isOperationMode()) {
        switchOperationBuiltToFreeDrag();
        return;
      }

      setMode("free", { preserveBlocks: true });
      additionBuilt = false;
      additionPracticeBuilt = false;
      additionFreeBuilt = false;
      subtractionRegrouped = false;
      subtractionStepCounts = null;
      additionNumbers = { a: 0, b: 0 };
      closeFormulaModal();
    }

    function moveGhost(x, y) {
      if (!currentDrag || !currentDrag.ghost) return;
      currentDrag.ghost.style.left = x + "px";
      currentDrag.ghost.style.top = y + "px";
    }

    function addBlock(type, value, x, y) {
      if (total + value > getCurrentVisualMax()) {
        showInputError(isOperationMode() ? "total" : "freeTotal");
        return;
      }

      const block = createBlockElement(type, value);
      requestAnimationFrame(() => {
        const maxX = workspace.clientWidth - block.offsetWidth;
        const maxY = workspace.clientHeight - block.offsetHeight;
        const wantedLeft = clamp(x - block.offsetWidth / 2, 0, maxX);
        const wantedTop = clamp(y - block.offsetHeight / 2, 0, maxY);
        const position = findFreePosition(block, wantedLeft, wantedTop);
        block.style.left = position.left + "px";
        block.style.top = position.top + "px";
      });
      total += value;
      hideAnswer();
      updateDisplay();
      updateWorkspaceLayout();
    }

    function addPracticeBlock(type, value, group, placeCategory) {
      if (total + value > getCurrentVisualMax()) {
        showInputError(isOperationMode() ? "total" : "freeTotal");
        return null;
      }

      const block = createBlockElement(type, value, group);
      block.dataset.placeCategory = placeCategory;
      total += value;

      if (additionFreeBuilt) {
        subtractionRegrouped = false;
        subtractionStepCounts = null;
        subtractionStepIndex = 0;
        lastBorrowStepDetail = null;
      teachingExpanded = false;
        syncAdditionNumbersFromBlocks();
        updateFormulaView();
      }

      hideAnswer();
      updateDisplay();
      updateWorkspaceLayout();
      return block;
    }

    function findAdditionTargetAt(clientX, clientY) {
      for (const box of additionBoxes) {
        const rect = box.getBoundingClientRect();
        const inside = clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
        if (!inside) continue;
        return { group: box.dataset.group, category: box.dataset.category };
      }
      return null;
    }

    function findValidAdditionTargetAt(clientX, clientY, type) {
      const target = findAdditionTargetAt(clientX, clientY);
      if (!target) return null;
      if (target.category !== type) return null;
      return target;
    }

    function startMoveExisting(e) {
      e.preventDefault();
      if (e.currentTarget.dataset.group === "T") return;
      if (isOperationMode() && additionBuilt) switchOperationBuiltToFreeDrag();
      else if (isOperationMode() && additionFreeBuilt && hasOperationQuestionInputs()) {
        clearOperationQuestionInputs();
        clearInputError();
        syncAdditionNumbersFromBlocks();
        updateAdditionLabels();
        updateAdditionButtonStates();
      }
      if (answerVisible) hideAnswer();
      updateDisplay();

      const block = e.currentTarget;
      const rect = workspace.getBoundingClientRect();
      const blockRect = block.getBoundingClientRect();
      currentDrag = {
        mode: "move",
        block,
        offsetX: e.clientX - blockRect.left,
        offsetY: e.clientY - blockRect.top,
        workspaceRect: rect,
        lastLeft: parseFloat(block.style.left) || 0,
        lastTop: parseFloat(block.style.top) || 0
      };

      block.setPointerCapture(e.pointerId);
      block.addEventListener("pointermove", moveExisting);
      block.addEventListener("pointerup", stopMoveExisting);
      block.addEventListener("pointercancel", stopMoveExisting);
    }

    function moveExisting(e) {
      if (!currentDrag || currentDrag.mode !== "move") return;
      const { block, offsetX, offsetY, workspaceRect } = currentDrag;
      const maxX = workspace.clientWidth - block.offsetWidth;
      const maxY = workspace.clientHeight - block.offsetHeight;
      const nextLeft = clamp(e.clientX - workspaceRect.left - offsetX, 0, maxX);
      const nextTop = clamp(e.clientY - workspaceRect.top - offsetY, 0, maxY);
      if (!hasOverlap(block, nextLeft, nextTop)) {
        block.style.left = nextLeft + "px";
        block.style.top = nextTop + "px";
        currentDrag.lastLeft = nextLeft;
        currentDrag.lastTop = nextTop;
      } else {
        block.style.left = currentDrag.lastLeft + "px";
        block.style.top = currentDrag.lastTop + "px";
      }
    }

    function stopMoveExisting(e) {
      const block = e.currentTarget;
      block.removeEventListener("pointermove", moveExisting);
      block.removeEventListener("pointerup", stopMoveExisting);
      block.removeEventListener("pointercancel", stopMoveExisting);

      if (isOperationMode() && (additionPracticeBuilt || additionFreeBuilt)) {
        const target = findValidAdditionTargetAt(e.clientX, e.clientY, block.dataset.type);
        if (target) {
          block.dataset.group = target.group;
